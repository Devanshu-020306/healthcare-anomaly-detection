services:
  - type: web
    name: healthcare-backend
    runtime: python
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements_simple.txt
    startCommand: python app_simple.py
    envVars:
      - key: PORT
        value: 5000
      - key: PYTHON_VERSION
        value: 3.10.0
    healthCheckPath: /api/health
